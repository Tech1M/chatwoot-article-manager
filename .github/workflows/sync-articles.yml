
name: Sync Articles to Chatwoot

on:
  push:
    branches: [main]
    paths:
      - 'docs/*/.md'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Sync articles to Chatwoot
        env:
          CHATWOOT_BASE_URL: ${{ secrets.CHATWOOT_BASE_URL }}
          CHATWOOT_API_TOKEN: ${{ secrets.CHATWOOT_API_TOKEN }}
          CHATWOOT_ACCOUNT_ID: ${{ secrets.CHATWOOT_ACCOUNT_ID }}
          CHATWOOT_PORTAL_SLUG: ${{ secrets.CHATWOOT_PORTAL_SLUG }}
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0, '.')
          from backend.chatwoot_client import ChatwootClient
          from backend.sync_engine import sync

          dryrun = '${{ github.event.inputs.dryrun }}' == 'true'
          docsdir = os.environ.get('DOCS_DIR', './docs')

          client = ChatwootClient(
              os.environ['CHATWOOT_BASE_URL'],
              os.environ['CHATWOOT_API_TOKEN'],
              os.environ.get('CHATWOOT_ACCOUNT_ID', '1'),
          )

          results = sync(
              client,
              os.environ['CHATWOOT_PORTAL_SLUG'],
              docs_dir,
              chunk_size=10,
              dryrun=dryrun,
          )

          print(f'Total: {results[\"total\"]}')
          print(f'Created: {results[\"created\"]}')
          print(f'Updated: {results[\"updated\"]}')
          print(f'Skipped: {results[\"skipped\"]}')
          print(f'Failed: {results[\"failed\"]}')

          for d in results['details']:
              status = '✓' if d.get('ok') else ('⚠' if d.get('dry_run') else '✗' if d.get('error') else '·')
              print(f'  {status} [{d[\"action\"]}] {d[\"file\"]}')
              if d.get('error'):
                  print(f'    Error: {d[\"error\"]}')

          if results['failed'] > 0:
              sys.exit(1)
          "

      - name: Update sync manifest
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/.chatwoot-sync.json 2>/dev/null; then
            echo "No manifest changes to commit"
          else
            git add docs/.chatwoot-sync.json
            git commit -m "chore: update chatwoot sync manifest [skip ci]"
            git push
          fi
